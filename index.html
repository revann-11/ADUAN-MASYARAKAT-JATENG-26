<!DOCTYPE html>
<html>
<head>
    <title>Aduan Masyarakat Jawa Tengah</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #1e1e1e;
            color: white;
        }

        /* LOGO WATERMARK */
        .logo-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            transform: translate(-50%, -50%);
            opacity: 0.06;
            z-index: -1;
            transition: 0.5s;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: rgba(0,0,0,0.7);
            padding: 25px;
            width: 350px;
            border-radius: 15px;
            text-align: center;
        }

        input, textarea, select {
            width: 100%;
            margin: 6px 0;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: orange;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        #preview {
            width: 100%;
            margin-top: 10px;
            display: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- LOGO -->
<img src="logo.png" class="logo-bg" id="logoBg">

<div class="container">
<div class="form-box">

<h2>FORM ADUAN</h2>

<form id="formAduan">

<input type="text" id="nama" placeholder="Nama" required>

<select id="kabupaten" required>
<option value="">Loading...</option>
</select>

<select id="kecamatan" required>
<option value="">Pilih Kecamatan</option>
</select>

<input type="text" id="alamat" placeholder="Alamat lengkap" required>

<textarea id="masalah" placeholder="Masalah yang diadukan" required></textarea>

<input type="file" id="foto" accept="image/*">

<img id="preview">

<button type="submit" id="btnKirim">Kirim Aduan</button>

<p id="loading" style="display:none;">⏳ Mengirim...</p>

</form>

<div id="successMsg" style="display:none;">
<h3 style="color:lightgreen;">✅ Berhasil</h3>
<p>Terimakasih, aduan anda sudah kami terima 🙏</p>
</div>

</div>
</div>

<script>
// LOAD KABUPATEN
fetch("https://www.emsifa.com/api-wilayah-indonesia/api/regencies/33.json")
.then(res => res.json())
.then(data => {
    let kab = document.getElementById("kabupaten");
    kab.innerHTML = "<option value=''>Pilih Kabupaten</option>";

    data.forEach(k => {
        let opt = document.createElement("option");
        opt.value = k.id;
        opt.textContent = k.name;
        kab.appendChild(opt);
    });
});

// LOAD KECAMATAN
document.getElementById("kabupaten").addEventListener("change", function() {
    let id = this.value;
    let kec = document.getElementById("kecamatan");

    kec.innerHTML = "<option>Loading...</option>";

    fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${id}.json`)
    .then(res => res.json())
    .then(data => {
        kec.innerHTML = "<option>Pilih Kecamatan</option>";

        data.forEach(d => {
            let opt = document.createElement("option");
            opt.textContent = d.name;
            kec.appendChild(opt);
        });
    });
});

// PREVIEW FOTO
document.getElementById("foto").addEventListener("change", function(e){
    let file = e.target.files[0];
    let preview = document.getElementById("preview");

    if(file){
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});

// SUBMIT
document.getElementById("formAduan").addEventListener("submit", function(e){
    e.preventDefault();

    document.getElementById("btnKirim").style.display="none";
    document.getElementById("loading").style.display="block";

    setTimeout(()=>{
        document.getElementById("formAduan").style.display="none";
        document.getElementById("successMsg").style.display="block";

        // LOGO HILANG (FADE)
        document.getElementById("logoBg").style.opacity = "0";

    },1500);
});
</script>

</body>
</html>
