<!DOCTYPE html>
<html>
<head>
    <title>Aduan Masyarakat Jawa Tengah</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: white;
        }

        /* HEADER */
        header {
            text-align: center;
            background: #111;
            padding: 15px;
        }

        .logo {
            width: 90px;
        }

        /* LOGO BACKGROUND */
        .logo-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 280px;
            transform: translate(-50%, -50%);
            opacity: 0.08;
            z-index: -1;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 120px);
        }

        .form-box {
            background: rgba(0,0,0,0.7);
            padding: 25px;
            width: 350px;
            border-radius: 15px;
        }

        h2 {
            text-align: center;
        }

        input, textarea, select {
            width: 100%;
            margin: 6px 0;
            padding: 10px;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: orange;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: darkorange;
        }

        #preview {
            width: 100%;
            margin-top: 10px;
            display: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- ✅ HEADER LOGO (INI YANG KAMU TANYAIN) -->
<header>
    <img src="logo.png" alt="Logo Jawa Tengah" class="logo">
    <h1>Aduan Masyarakat Jawa Tengah</h1>
</header>

<!-- BACKGROUND LOGO -->
<img src="logo.png" class="logo-bg">

<div class="container">
<div class="form-box">

<h2>FORM ADUAN MASYARAKAT</h2>

<form id="formAduan">

<label>Nama</label>
<input type="text" id="nama" required>

<label>Kabupaten</label>
<select id="kabupaten" required>
<option>Loading...</option>
</select>

<label>Kecamatan</label>
<select id="kecamatan" required>
<option>Pilih Kecamatan</option>
</select>

<label>Alamat Lengkap</label>
<input type="text" id="alamat" required>

<label>Masalah</label>
<textarea id="masalah" required></textarea>

<label>Upload Foto</label>
<input type="file" id="foto" accept="image/*">

<img id="preview">

<button type="submit">Kirim Aduan</button>

</form>

<div id="successMsg" style="display:none; text-align:center;">
<h3 style="color:lightgreen;">✅ Berhasil</h3>
<p>Terimakasih, aduan anda sudah kami terima 🙏</p>
</div>

</div>
</div>

<script>

// ================== KABUPATEN ==================
fetch("https://www.emsifa.com/api-wilayah-indonesia/api/regencies/33.json")
.then(res => res.json())
.then(data => {

    data.sort((a, b) => a.name.localeCompare(b.name));

    let kab = document.getElementById("kabupaten");
    kab.innerHTML = "<option value=''>Pilih Kabupaten</option>";

    data.forEach(k => {
        let opt = document.createElement("option");
        opt.value = k.id;
        opt.textContent = k.name;
        kab.appendChild(opt);
    });
});


// ================== KECAMATAN ==================
document.getElementById("kabupaten").addEventListener("change", function() {
    let id = this.value;
    let kec = document.getElementById("kecamatan");

    kec.innerHTML = "<option>Loading...</option>";

    fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/districts/${id}.json`)
    .then(res => res.json())
    .then(data => {

        data.sort((a, b) => a.name.localeCompare(b.name));

        kec.innerHTML = "<option>Pilih Kecamatan</option>";

        data.forEach(d => {
            let opt = document.createElement("option");
            opt.textContent = d.name;
            kec.appendChild(opt);
        });
    });
});


// ================== PREVIEW FOTO ==================
document.getElementById("foto").addEventListener("change", function(e){
    let file = e.target.files[0];
    let preview = document.getElementById("preview");

    if(file){
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});


// ================== SUBMIT ==================
document.getElementById("formAduan").addEventListener("submit", function(e){
    e.preventDefault();

    let nama = document.getElementById("nama").value.trim();
    let alamat = document.getElementById("alamat").value.trim();

    if(nama.length < 3){
        alert("Nama minimal 3 huruf!");
        return;
    }

    if(alamat.length < 5){
        alert("Alamat terlalu pendek!");
        return;
    }

    document.getElementById("formAduan").style.display="none";
    document.getElementById("successMsg").style.display="block";
});

</script>

</body>
</html>
