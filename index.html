<!DOCTYPE html>
<html>
<head>
    <title>Aduan Masyarakat Jawa Tengah</title>

    <style>
        body {
            font-family: Arial;
            background: #1e1e1e;
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .form-box {
            background: #2c2c2c;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
        }

        input, textarea, select {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: orange;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        #loading {
            text-align: center;
            margin-top: 10px;
        }

        #successMsg {
            text-align: center;
        }
    </style>

</head>
<body>

<div class="container">
    <div class="form-box">

        <h2>FORM ADUAN</h2>

        <form id="formAduan">

            <label>Nama</label>
            <input type="text" id="nama" required>

            <label>Kabupaten</label>
            <select id="kabupaten" required>
                <option value="">Pilih Kabupaten</option>
                <option>Semarang</option>
                <option>Magelang</option>
            </select>

            <label>Kecamatan</label>
            <select id="kecamatan" required>
                <option value="">Pilih Kecamatan</option>
            </select>

            <label>Alamat</label>
            <input type="text" id="alamat" required>

            <label>Masalah</label>
            <textarea id="masalah" required></textarea>

            <label>Upload Foto</label>
            <input type="file" id="foto" accept="image/*">

            <img id="preview" style="display:none; width:100%; margin-top:10px;">

            <button type="submit" id="btnKirim">Kirim Aduan</button>

            <p id="loading" style="display:none;">⏳ Mengirim...</p>

        </form>

        <div id="successMsg" style="display:none;">
            <h3 style="color:lightgreen;">✅ Berhasil</h3>
            <p>Aduan anda sudah kami terima 🙏</p>
        </div>

    </div>
</div>

<script>
    // DATA kecamatan
    const dataKecamatan = {
        "Semarang": ["Tembalang", "Banyumanik", "Candisari"],
        "Magelang": ["Mertoyudan", "Secang", "Bandongan"]
    };

    // Kecamatan otomatis
    document.getElementById("kabupaten").addEventListener("change", function() {
        let kecamatan = document.getElementById("kecamatan");
        kecamatan.innerHTML = "<option value=''>Pilih Kecamatan</option>";

        if (dataKecamatan[this.value]) {
            dataKecamatan[this.value].forEach(kec => {
                let opt = document.createElement("option");
                opt.textContent = kec;
                kecamatan.appendChild(opt);
            });
        }
    });

    // Preview foto
    document.getElementById("foto").addEventListener("change", function(e) {
        const file = e.target.files[0];
        const preview = document.getElementById("preview");

        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    });

    // Submit form
    document.getElementById("formAduan").addEventListener("submit", function(e) {
        e.preventDefault();

        let nama = document.getElementById("nama").value.trim();
        let alamat = document.getElementById("alamat").value.trim();

        // VALIDASI
        if (nama.length < 3) {
            alert("Nama minimal 3 huruf!");
            return;
        }

        if (alamat.length < 5) {
            alert("Alamat terlalu pendek!");
            return;
        }

        // Loading
        document.getElementById("btnKirim").style.display = "none";
        document.getElementById("loading").style.display = "block";

        setTimeout(() => {
            document.getElementById("formAduan").style.display = "none";
            document.getElementById("successMsg").style.display = "block";
        }, 1500);
    });
</script>

</body>
</html>
