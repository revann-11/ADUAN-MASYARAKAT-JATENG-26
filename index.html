<!DOCTYPE html>
<html>
<head>
    <title>Aduan Masyarakat Jawa Tengah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div><b>Aduan Jateng</b></div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">Tentang</a>
    </div>
</div>

<!-- Form -->
<div class="container">
    <div class="form-box fade-in">
        <h2>FORM ADUAN MASYARAKAT</h2>

        <form id="formAduan">

            <label>Nama Pengadu</label>
            <input type="text" required>

            <label>Kabupaten / Kota</label>
            <select required>
                <option value="" disabled selected>Pilih Kabupaten/Kota</option>

                <option>Banjarnegara</option>
                <option>Banyumas</option>
                <option>Batang</option>
                <option>Blora</option>
                <option>Boyolali</option>
                <option>Brebes</option>
                <option>Cilacap</option>
                <option>Demak</option>
                <option>Grobogan</option>
                <option>Jepara</option>
                <option>Karanganyar</option>
                <option>Kebumen</option>
                <option>Kendal</option>
                <option>Klaten</option>
                <option>Kudus</option>
                <option>Magelang</option>
                <option>Pati</option>
                <option>Pekalongan</option>
                <option>Pemalang</option>
                <option>Purbalingga</option>
                <option>Purworejo</option>
                <option>Rembang</option>
                <option>Salatiga</option>
                <option>Semarang</option>
                <option>Solo (Surakarta)</option>
                <option>Sragen</option>
                <option>Sukoharjo</option>
                <option>Tegal</option>
                <option>Temanggung</option>
                <option>Wonogiri</option>
                <option>Wonosobo</option>
            </select>

            <label>Alamat Lengkap</label>
            <input type="text" required>

            <label>Masalah yang Diadukan</label>
            <textarea required></textarea>

            <label>Waktu Kejadian</label>
            <input type="datetime-local" required>

            <button type="submit">Kirim Aduan</button>
        </form>

        <!-- Pesan sukses -->
        <div id="successMsg" style="display:none;">
            <h3 style="color: lightgreen;">✅ Aduan Berhasil Dikirim</h3>
            <p>Terimakasih, laporan anda sudah kami terima 🙏</p>
            <br>
            <button onclick="location.reload()">Kirim Lagi</button>
        </div>

    </div>
</div>

<!-- Karakter -->
<img src="https://i.ibb.co/4f3jZ6m/character.png" class="character">

<script src="script.js"></script>
</body>
</html>
