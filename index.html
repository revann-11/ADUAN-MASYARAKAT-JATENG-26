<!-- Form -->
<div class="container">
    <div class="form-box fade-in">
        <h2>FORM ADUAN MASYARAKAT</h2>

        <form id="formAduan">
            <input type="text" placeholder="Nama Pengadu" required>

            <select required>
                <option value="" disabled selected>Pilih Kabupaten/Kota</option>
                <option>Semarang</option>
                <option>Solo (Surakarta)</option>
                <option>Magelang</option>
                <option>Salatiga</option>
                <option>Pekalongan</option>
                <option>Tegal</option>
                <option>Banjarnegara</option>
                <option>Banyumas</option>
                <option>Batang</option>
                <option>Blora</option>
                <option>Boyolali</option>
                <option>Brebes</option>
                <option>Cilacap</option>
                <option>Demak</option>
                <option>Grobogan</option>
                <option>Jepara</option>
                <option>Karanganyar</option>
                <option>Kebumen</option>
                <option>Kendal</option>
                <option>Klaten</option>
                <option>Kudus</option>
                <option>Pati</option>
                <option>Pemalang</option>
                <option>Purbalingga</option>
                <option>Purworejo</option>
                <option>Rembang</option>
                <option>Sragen</option>
                <option>Sukoharjo</option>
                <option>Temanggung</option>
                <option>Wonogiri</option>
                <option>Wonosobo</option>
            </select>

            <input type="text" placeholder="Alamat Lengkap (jalan, RT/RW, dll)" required>

            <textarea placeholder="Masalah yang diadukan" required></textarea>

            <input type="text" placeholder="Waktu kejadian" required>

            <button type="submit">Kirim Aduan</button>
        </form>
    </div>
</div>
